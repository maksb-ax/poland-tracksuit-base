<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People who LOVE WEAR tracksuit</title>

<!-- Pobieranie sprawnego skryptu Supabase -->
<script src="https://cloudflare.com"></script>

<style>
body {
    /* Tło z ciemnym motywem oraz niebieską poświatą od samego dołu strony */
    background: radial-gradient(circle at bottom, #101c38 0%, #111119 60%, #0a0a0f 100%);
    background-attachment: fixed;
    color: white;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding: 30px;
    margin: 0;
    min-height: 100vh;
    box-sizing: border-box;
}

/* Neonowy napis dla głównego nagłówka */
h1 {
    font-size: 2.5rem;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 5px #fff, 0 0 10px #2F2F4F, 0 0 20px #7ab7ff, 0 0 40px #7ab7ff;
    margin-bottom: 30px;
}

/* Różowy neon dedykowany specjalnie dla słowa LOVE */
h1 span.pink-neon {
    color: #ff7ebb;
    text-shadow: 0 0 5px #fff, 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
}

h2, h3 {
    text-shadow: 0 0 5px #fff, 0 0 10px #7ab7ff;
}

.screen {
    display: none;
    max-width: 400px;
    margin: 0 auto;
    background: rgba(25, 25, 40, 0.55);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(122, 183, 255, 0.15);
}

.active { display: block; }

input, button {
    display: block;
    margin: 15px auto;
    padding: 15px;
    width: 300px;
    box-sizing: border-box;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
    transition: all 0.3s ease;
}

input {
    background: rgba(255, 255, 255, 0.07);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.15);
    text-align: center;
}

input:focus {
    outline: none;
    border-color: #7ab7ff;
    box-shadow: 0 0 10px rgba(122, 183, 255, 0.5);
}

button {
    background: linear-gradient(135deg, #2F2F4F, #1a1a3a);
    color: white;
    cursor: pointer;
    font-weight: bold;
    border: 1px solid rgba(122, 183, 255, 0.3);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

button:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #3a3a63, #22224d);
    box-shadow: 0 0 15px rgba(122, 183, 255, 0.6);
}

/* Wyrównanie statystyk profilu do lewej strony */
.profile-stats {
    text-align: left;
    background: rgba(0, 0, 0, 0.4);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
    border-left: 4px solid #7ab7ff;
    font-size: 1.05rem;
    line-height: 1.8;
}

#output {
    margin-top: 20px;
}

a {
    color: #7ab7ff;
    text-decoration: none;
    font-weight: bold;
}

a:hover {
    color: white;
    text-shadow: 0 0 8px #7ab7ff;
}
</style>
</head>
<body>

<!-- Zastosowanie taga span w celu ostylowania samego słowa LOVE na różowo -->
<h1>People who <span class="pink-neon">LOVE</span> WEAR tracksuit</h1>

<div id="auth" class="screen active">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Zaloguj</button>
    <button onclick="register()">Stwórz konto</button>
</div>

<div id="menu" class="screen">
    <button onclick="showScreen('app')">Wchodzę na stronę</button>
    <button onclick="showTop()">Lista TOP</button>
</div>

<div id="top" class="screen">
    <h2>TOP Ranking</h2>
    <div id="topList"></div>
    <button onclick="showScreen('menu')">Powrót</button>
</div>

<div id="app" class="screen">
    <button onclick="losujDres()">1. Wylosuj dres</button>
    <button onclick="bylemWDresach()">2. Byłem dziś w dresach</button>
    <button onclick="jakNosic()">3. Jak nosić dresy</button>
    <button onclick="polecane()">4. Polecane dresy</button>
    <button onclick="discord()">5. Discord</button>
    <button onclick="showScreen('menu')">Menu</button>

    <div id="output"></div>
</div>

<script>
const SUPABASE_URL = "https://supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpbXloZ2twanRqaml0eXJzbWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTg1MzYsImV4cCI6MjA5NzE5NDUzNn0.gM8nR0-zRJmOBX55E6beEb4T0PSW-tAcCB1icrol9VY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

/* ===== DRESY ===== */
const dresy = [
"Nike Tech Fleece",
"Cusbclo Czarne",
"Cusbclo Szare",
"Cusbclo Granatowe",
"Cusbclo Zielone",
"Cusbclo Rich Red"
];

/* ===== PRODUKTY ===== */
const produkty = [
  { name: "Nike Tech Fleece", url: "https://nike.com" },
  { name: "Cusbclo - Czarne", url: "https://cusbclo.com" },
  { name: "Cusbclo - Szare grafitowe", url: "https://cusbclo.com" },
  { name: "Cusbclo - Granatowe", url: "https://cusbclo.com" },
  { name: "Cusbclo - Zielone", url: "https://cusbclo.com" },
  { name: "Cusbclo - Rich red", url: "https://cusbclo.com" }
];

/* ===== SCREEN SYSTEM ===== */
function showScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("output").innerHTML = "";
    if(id === 'app') { updateUI(); }
}

/* ===== REGISTER ===== */
async function register(){
    const username=document.getElementById("username").value.trim();
    const password=document.getElementById("password").value.trim();

    if(!username || !password){
        alert("Wpisz login i hasło");
        return;
    }

    const {data, error}=await client.from("users").insert([{
        username,
        password,
        streak:0,
        best_streak:0,
        total_days:0,
        dres:""
    }]).select();

    if(error){
        alert("Błąd bazy: " + error.message);
        return;
    }

    alert("Konto stworzone! Możesz się teraz zalogować.");
}

/* ===== LOGIN ===== */
async function login(){
    const username=document.getElementById("username").value.trim();
    const password=document.getElementById("password").value.trim();

    if(!username || !password){
        alert("Wpisz login i hasło");
        return;
    }

    const {data, error}=await client
    .from("users")
    .select("*")
    .eq("username", username)
    .eq("password", password)
    .maybeSingle();

   if(error){
    alert("Błąd logowania: " + error.message);
    return;
}

if(!data){
    alert("Zły login lub hasło");
    return;
}

    currentUser=data;
    showScreen("menu");
}

/* ===== UI ===== */
function updateUI(){
    if(!currentUser) return;
    document.getElementById("output").innerHTML=`
        <div class="profile-stats">
            👤 <b>Użytkownik:</b> ${currentUser.username}<br>
            🔥 <b>Passa:</b> ${currentUser.streak || 0}<br>
            🏆 <b>Best passa:</b> ${currentUser.best_streak || 0}<br>
            📅 <b>Dni w dresach:</b> ${currentUser.total_days || 0}<br>
            👕 <b>Dres na dziś:</b> ${currentUser.dres || "brak"}
        </div>
    `;
}

/* ===== LOSOWANIE ===== */
function losujDres(){
    if(!currentUser) return;
    let i=0;

    const interval=setInterval(()=>{
        document.getElementById("output").innerHTML=
        "<div class='profile-stats' style='text-align:center;'>🎡 Losowanie... <br><b>" + dresy[i % dresy.length] + "</b></div>";
        i++;
    },200);

    setTimeout(async ()=>{
        clearInterval(interval);

        const chosen=dresy[Math.floor(Math.random()*dresy.length)];
        currentUser.dres=chosen;

        await client
        .from("users")
        .update({dres:chosen})
        .eq("username", currentUser.username);

        updateUI();
    },3000);
}

/* ===== STREAK ===== */
async function bylemWDresach(){
    if(!currentUser) return;
    
    const today = new Date().toISOString().split("T")[0];

    if(currentUser.last_click===today){
        alert("Dzisiaj już kliknięte!");
        return;
    }

    let streak=1;

    if(currentUser.last_click){
        let last=new Date(currentUser.last_click);
        let now=new Date(today);
        let diff=(now-last)/(1000*60*60*24);

        if(diff===1){
            streak=currentUser.streak+1;
        }
    }

    let best=Math.max(streak,currentUser.best_streak || 0);

    currentUser.streak=streak;
    currentUser.best_streak=best;
    currentUser.total_days=(currentUser.total_days || 0)+1;
    currentUser.last_click=today;

    await client.from("users")
    .update({
        streak,
        best_streak:best,
        total_days:currentUser.total_days,
        last_click:today
    })
    .eq("username", currentUser.username);

    updateUI();
}

/* ===== INFO ===== */
function jakNosic(){
    document.getElementById("output").innerHTML=
    "<div class='profile-stats' style='text-align:center;'>👕 Czarne dresy + sneakersy + hoodie = top styl</div>";
}

/* ===== POLECANE ===== */
function polecane(){
    let html = "<div class='profile-stats' style='text-align:center;'><h3>Polecane dresy</h3>";
    produkty.forEach(p => {
        html += `<div style="margin:12px 0;"><a href="${p.url}" target="_blank">👕 ${p.name}</a></div>`;
    });
    html += "</div>";
    document.getElementById("output").innerHTML = html;
}

/* ===== DISCORD ===== */
function discord(){
    window.open("https://discord.com", "_blank");
}

/* ===== TOP ===== */
async function showTop(){
    const {data, error} = await client
    .from("users")
    .select("*")
    .order("best_streak",{ascending:false})
    .limit(10);

    if(error){
        alert("Błąd rankingu: " + error.message);
        return;
    }

    let html="<h3>TOP PASSA</h3><div class='profile-stats'>";
    data.forEach((u,i)=>{
        html += `${i+1}. <b>${u.username}</b> — ${u.best_streak || 0}<br>`;
    });
    html += "</div>";

    document.getElementById("topList").innerHTML=html;
    showScreen("top");
}
</script>

</body>
</html>
