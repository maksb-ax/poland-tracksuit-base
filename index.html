<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People who LOVE WEAR tracksuit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%);
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
}

/* Neonowy nagłówek */
h1 {
  font-size: 2.5rem;
  text-transform: uppercase;
  color: #fff;
  text-shadow: 0 0 5px #fff, 0 0 10px #2F2F4F, 0 0 20px #7ab7ff, 0 0 40px #7ab7ff;
  margin-bottom: 30px;
}
h1 span {
  color: #ff69b4;
  text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4, 0 0 40px #ff69b4;
}

/* Ekrany */
.screen { display: none; }
.active { display: flex; flex-direction: column; align-items: center; }

/* Panel logowania */
#auth.active {
  background: rgba(47, 47, 79, 0.4);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.1);
  width: 350px;
}

/* Inputy */
input {
  width: 100%;
  background: rgba(255, 255, 255, 0.1);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 12px;
  padding: 15px;
  margin-top: 10px;
  text-align: center;
}

/* Przyciski */
button {
  width: 100%;
  background: linear-gradient(135deg, #2F2F4F, #1a1a3a);
  color: white;
  font-weight: bold;
  border-radius: 12px;
  border: none;
  padding: 15px;
  margin-top: 10px;
  box-shadow: 0 0 10px rgba(122, 183, 255, 0.3);
  transition: all 0.3s ease;
  cursor: pointer;
}
button:hover {
  background: linear-gradient(135deg, #3a3a63, #22224d);
  box-shadow: 0 0 20px rgba(122, 183, 255, 0.6);
  transform: translateY(-2px);
}

/* Loader */
#loading.active {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.loader {
  border: 6px solid rgba(255, 255, 255, 0.2);
  border-top: 6px solid #7ab7ff;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>
<h1>PEOPLE WHO <span>LOVE</span> WEAR TRACKSUIT</h1>

<div id="auth" class="screen active">
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Zaloguj</button>
  <button onclick="register()">Stwórz konto</button>
</div>

<div id="loading" class="screen">
  <div class="loader"></div>
</div>

<div id="menu" class="screen">
  <button onclick="showScreen('app')">Wchodzę na stronę</button>
  <button onclick="showTop()">Lista TOP</button>
</div>

<div id="top" class="screen">
  <h2>TOP Ranking</h2>
  <div id="topList"></div>
  <button onclick="showScreen('menu')">Powrót</button>
</div>

<div id="app" class="screen">
  <button onclick="losujDres()">1. Wylosuj dres</button>
  <button onclick="bylemWDresach()">2. Byłem dziś w dresach</button>
  <button onclick="jakNosic()">3. Jak nosić dresy</button>
  <button onclick="polecane()">4. Polecane dresy</button>
  <button onclick="discord()">5. Discord</button>
  <button onclick="showScreen('menu')">Menu</button>
  <div id="output"></div>
</div>

<script>
const client = supabase.createClient(
  "https://aimyhgkpjtjjityrsmai.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpbXloZ2twanRqaml0eXJzbWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTg1MzYsImV4cCI6MjA5NzE5NDUzNn0.gM8nR0-zRJmOBX55E6beEb4T0PSW-tAcCB1icrol9VY"
);

let currentUser = null;

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

async function register(){
  const username=document.getElementById("username").value.trim();
  const password=document.getElementById("password").value.trim();
  if(!username || !password){ alert("Wpisz login i hasło"); return; }

  const {error}=await client.from("users").insert([{username,password,streak:0,best_streak:0,total_days:0,dres:""}]);
  if(error){ alert(error.message); return; }
  alert("Konto stworzone, GRATULACJE!");
}

async function login(){
  showScreen("loading");
  setTimeout(async ()=>{
    const username=document.getElementById("username").value.trim();
    const password=document.getElementById("password").value.trim();

    const {data,error}=await client.from("users").select("*").eq("username",username).eq("password",password).maybeSingle();
    if(error){ alert(error.message); showScreen("auth"); return; }
    if(!data){ alert("Zły login lub hasło"); showScreen("auth"); return; }

    currentUser=data;
    showScreen("menu");
    updateUI();
  },2000);
}

function updateUI(){
  document.getElementById("output").innerHTML=`
    👤 Nazwa użytkownika: ${currentUser.username}<br>
    🔥 Passa: ${currentUser.streak || 0}<br>
    🏆 Best passa: ${currentUser.best_streak || 0}<br>
    📅 Ogółem w dresach był*m: ${currentUser.total_days || 0} razy<br>
    👕 Dresy na dziś: ${currentUser.dres || "brak"}
  `;
}

function jakNosic(){
  document.getElementById("output").innerHTML="👕 Czarne dresy + sneakersy + hoodie = top styl";
}

function discord(){ window.location="https://discord.com/"; }
</script>
</body>
</html>
