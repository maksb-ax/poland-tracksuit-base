<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People who LOVE WEAR tracksuit</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    background:#1a1a1a;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

.screen{display:none;}
.active{display:block;}

input,button{
    display:block;
    margin:10px auto;
    padding:15px;
    width:300px;
    border-radius:12px;
    border:none;
}

button{
    background:#2F2F4F;
    color:white;
    cursor:pointer;
}

#output{
    margin-top:20px;
    padding:20px;
}

a{
    color:#7ab7ff;
    text-decoration:none;
}
a:hover{
    color:white;
}
</style>
</head>

<body>

<h1>People who LOVE WEAR tracksuit</h1>

<div id="auth" class="screen active">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Zaloguj</button>
    <button onclick="register()">Stwórz konto</button>
</div>

<div id="menu" class="screen">
    <button onclick="showScreen('app')">Wchodzę na stronę</button>
    <button onclick="showTop()">Lista TOP</button>
</div>

<div id="top" class="screen">
    <h2>TOP Ranking</h2>
    <div id="topList"></div>
    <button onclick="showScreen('menu')">Powrót</button>
</div>

<div id="app" class="screen">
    <button onclick="losujDres()">1. Wylosuj dres</button>
    <button onclick="bylemWDresach()">2. Byłem dziś w dresach</button>
    <button onclick="jakNosic()">3. Jak nosić dresy</button>
    <button onclick="polecane()">4. Polecane dresy</button>
    <button onclick="discord()">5. Discord</button>
    <button onclick="showScreen('menu')">Menu</button>

    <div id="output"></div>
</div>

<script>

/* 🔥 TWÓJ SUPABASE */
const SUPABASE_URL = "https://aimyhgkpjtjjityrsmai.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpbXloZ2twanRqaml0eXJzbWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTg1MzYsImV4cCI6MjA5NzE5NDUzNn0.gM8nR0-zRJmOBX55E6beEb4T0PSW-tAcCB1icrol9VY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

/* ===== DRESY ===== */
const dresy = [
"Nike Tech Fleece",
"Cusbclo Czarne",
"Cusbclo Szare",
"Cusbclo Granatowe",
"Cusbclo Zielone",
"Cusbclo Rich Red"
];

/* ===== LINKI ===== */
const produkty = [
  { name:"Nike Tech Fleece", url:"https://www.nike.com/pl/" },
  { name:"Cusbclo Czarne", url:"https://www.cusbclo.com/collections/tracksuits-2025/products/jogger-schwarz" },
  { name:"Cusbclo Szare", url:"https://www.cusbclo.com/collections/tracksuits-2025/products/jogger-anthrazit" },
  { name:"Cusbclo Granatowe", url:"https://www.cusbclo.com/collections/tracksuits-2025/products/navy-jogger" },
  { name:"Cusbclo Zielone", url:"https://www.cusbclo.com/collections/tracksuits-2025/products/jogger-bronze-green" },
  { name:"Cusbclo Rich Red", url:"https://www.cusbclo.com/collections/tracksuits-2025/products/jogger-rich-red" }
];

/* ===== SCREEN ===== */
function showScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ===== REGISTER ===== */
async function register(){
    const u = username.value.trim();
    const p = password.value.trim();

    const { error } = await client.from("users").insert([{
        username:u,
        password:p,
        streak:0,
        best_streak:0,
        total_days:0,
        dres:""
    }]);

    if(error){
        alert(error.message);
        return;
    }

    alert("Konto stworzone");
}

/* ===== LOGIN ===== */
async function login(){
    const u = username.value.trim();
    const p = password.value.trim();

    const { data, error } = await client
        .from("users")
        .select("*")
        .eq("username", u)
        .eq("password", p)
        .maybeSingle();

    if(error || !data){
        alert("Zły login lub hasło");
        return;
    }

    currentUser = data;
    showScreen("menu");
    updateUI();
}

/* ===== UI ===== */
function updateUI(){
    if(!currentUser) return;

    document.getElementById("output").innerHTML = `
        👤 ${currentUser.username}<br>
        🔥 Passa: ${currentUser.streak}<br>
        🏆 Best: ${currentUser.best_streak}<br>
        📅 Total: ${currentUser.total_days}<br>
        👕 Dres: ${currentUser.dres || "brak"}
    `;
}

/* ===== LOSOWANIE ===== */
function losujDres(){
    let i = 0;

    const interval = setInterval(()=>{
        document.getElementById("output").innerHTML =
        "🎡 Losowanie... " + dresy[i % dresy.length];
        i++;
    },150);

    setTimeout(async ()=>{
        clearInterval(interval);

        const chosen = dresy[Math.floor(Math.random()*dresy.length)];
        currentUser.dres = chosen;

        await client.from("users")
        .update({ dres: chosen })
        .eq("id", currentUser.id);

        updateUI();
    },3000);
}

/* ===== STREAK ===== */
async function bylemWDresach(){
    const today = new Date().toISOString().split("T")[0];

    if(currentUser.last_click === today){
        alert("Dzisiaj już kliknięte");
        return;
    }

    let streak = 1;

    if(currentUser.last_click){
        let last = new Date(currentUser.last_click);
        let now = new Date(today);
        let diff = (now-last)/(1000*60*60*24);

        if(diff === 1) streak = currentUser.streak + 1;
    }

    let best = Math.max(streak, currentUser.best_streak || 0);

    await client.from("users").update({
        streak,
        best_streak:best,
        total_days:(currentUser.total_days||0)+1,
        last_click:today
    }).eq("id", currentUser.id);

    currentUser.streak = streak;
    currentUser.best_streak = best;
    currentUser.total_days = (currentUser.total_days||0)+1;
    currentUser.last_click = today;

    updateUI();
}

/* ===== POLECANE (DZIAŁA) ===== */
function polecane(){
    let html = "<h3>Polecane dresy</h3>";

    produkty.forEach(p=>{
        html += `
        <div style="margin:10px 0;">
            <button onclick="window.open('${p.url}','_blank')" style="width:320px;">
                👕 ${p.name}
            </button>
        </div>`;
    });

    document.getElementById("output").innerHTML = html;
}

/* ===== INFO ===== */
function jakNosic(){
    document.getElementById("output").innerHTML =
    "👕 Dres + sneakers + hoodie = top styl";
}

/* ===== DISCORD ===== */
function discord(){
    window.location="https://discord.com/";
}

/* ===== TOP ===== */
async function showTop(){
    const { data } = await client
        .from("users")
        .select("*")
        .order("best_streak",{ascending:false})
        .limit(10);

    let html = "<h3>TOP PASSA</h3>";

    data.forEach((u,i)=>{
        html += `${i+1}. ${u.username} - ${u.best_streak}<br>`;
    });

    document.getElementById("topList").innerHTML = html;
    showScreen("top");
}

</script>

</body>
</html>
