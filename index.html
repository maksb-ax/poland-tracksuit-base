<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People who LOVE WEAR tracksuit</title>

<!-- Pobieranie biblioteki Supabase w wersji v2 -->
<script src="https://jsdelivr.net"></script>

<style>
body{
    background:#1a1a1a;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

.screen{display:none;}
.active{display:block;}

input,button{
    display:block;
    margin:10px auto;
    padding:15px;
    width:300px;
    border-radius:12px;
    border:none;
}

button{
    background:#2F2F4F;
    color:white;
    cursor:pointer;
}

#output{
    margin-top:20px;
    padding:20px;
}

a{
    color:#7ab7ff;
    text-decoration:none;
}

a:hover{
    color:white;
    text-decoration:underline;
}
</style>
</head>

<body>

<h1>People who LOVE WEAR tracksuit</h1>

<!-- Uproszczony ekran wejścia: Tylko Nick -->
<div id="auth" class="screen active">
    <input id="username" placeholder="Wpisz swój unikalny nick">
    <button onclick="wjedzNaStrone()">Wejdź na stronę</button>
</div>

<div id="menu" class="screen">
    <button onclick="showScreen('app')">Zobacz opcje dresów</button>
    <button onclick="showTop()">Lista TOP</button>
    <button onclick="wyloguj()">Zmień konto / Wyloguj</button>
</div>

<div id="top" class="screen">
    <h2>TOP Ranking</h2>
    <div id="topList"></div>
    <button onclick="showScreen('menu')">Powrót</button>
</div>

<div id="app" class="screen">
    <button onclick="losujDres()">1. Wylosuj dres</button>
    <button onclick="bylemWDresach()">2. Byłem dziś w dresach</button>
    <button onclick="jakNosic()">3. Jak nosić dresy</button>
    <button onclick="polecane()">4. Polecane dresy</button>
    <button onclick="discord()">5. Discord</button>
    <button onclick="showScreen('menu')">Menu</button>

    <div id="output"></div>
</div>

<script>
// Konfiguracja Twojej bazy danych Supabase
const SUPABASE_URL = "https://supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpbXloZ2twanRqaml0eXJzbWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTg1MzYsImV4cCI6MjA5NzE5NDUzNn0.gM8nR0-zRJmOBX55E6beEb4T0PSW-tAcCB1icrol9VY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

/* ===== DRESY ===== */
const dresy = [
"Nike Tech Fleece",
"Cusbclo Czarne",
"Cusbclo Szare",
"Cusbclo Granatowe",
"Cusbclo Zielone",
"Cusbclo Rich Red"
];

/* ===== PRODUKTY ===== */
const produkty = [
  { name: "Nike Tech Fleece", url: "https://nike.com" },
  { name: "Cusbclo - Czarne", url: "https://cusbclo.com" },
  { name: "Cusbclo - Szare grafitowe", url: "https://cusbclo.com" },
  { name: "Cusbclo - Granatowe", url: "https://cusbclo.com" },
  { name: "Cusbclo - Zielone", url: "https://cusbclo.com" },
  { name: "Cusbclo - Rich red", url: "https://cusbclo.com" }
];

/* ===== SCREEN SYSTEM ===== */
function showScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ===== LOGOWANIE ORAZ AUTOMATYCZNA REJESTRACJA ===== */
async function wjedzNaStrone(){
    const username = document.getElementById("username").value.trim();

    if(!username){
        alert("Wpisz swój nick, aby wejść!");
        return;
    }

    // 1. Sprawdzamy, czy użytkownik już istnieje w bazie danych
    const { data, error } = await client
        .from("users")
        .select("*")
        .eq("username", username)
        .maybeSingle();

    if(error){
        alert("Błąd bazy danych: " + error.message);
        return;
    }

    if(data) {
        // Użytkownik istnieje - logujemy go bezpośrednio
        currentUser = data;
        showScreen("menu");
        updateUI();
    } else {
        // Użytkownik nie istnieje - automatycznie zakładamy mu konto
        const { data: newUser, error: insertError } = await client
            .from("users")
            .insert([{
                username: username,
                password: "brak-hasla-otwarta-strona", // pole hasła zostaje uproszczone
                streak: 0,
                best_streak: 0,
                total_days: 0,
                dres: ""
            }])
            .select()
            .single();

        if(insertError){
            alert("Nie udało się stworzyć nowego profilu. Sprawdź opcje RLS w Supabase.");
            console.log(insertError);
            return;
        }

        currentUser = newUser;
        alert("Witaj nowy dresiarzu! Twoje konto zostało utworzone automatycznie.");
        showScreen("menu");
        updateUI();
    }
}

/* ===== WYLOGOWANIE ===== */
function wyloguj(){
    currentUser = null;
    document.getElementById("username").value = "";
    document.getElementById("output").innerHTML = "";
    showScreen("auth");
}

/* ===== UI ===== */
function updateUI(){
    if(!currentUser) return;
    document.getElementById("output").innerHTML = `
        👤 Nazwa użytkownika:  ${currentUser.username}<br>
        🔥 Passa: ${currentUser.streak || 0}<br>
        🏆 Best passa: ${currentUser.best_streak || 0}<br>
        📅 Ogółem w dresach był*m: ${currentUser.total_days || 0} razy <br>
        👕 Dresy na dziś: ${currentUser.dres || "brak"}
    `;
}

/* ===== LOSOWANIE ===== */
function losujDres(){
    if(!currentUser) return;
    let i = 0;

    const interval = setInterval(() => {
        document.getElementById("output").innerHTML = "🎡 Losowanie... " + dresy[i % dresy.length];
        i++;
    }, 200);

    setTimeout(async () => {
        clearInterval(interval);

        const chosen = dresy[Math.floor(Math.random() * dresy.length)];
        currentUser.dres = chosen;

        const { error } = await client
            .from("users")
            .update({ dres: chosen })
            .eq("id", currentUser.id);

        if(error) {
            alert("Błąd zapisu dresu.");
        }

        updateUI();
    }, 2000); // Skróciłem losowanie do 2 sekund, żeby było dynamiczniej
}

/* ===== STREAK (PASSA) ===== */
async function bylemWDresach(){
    if(!currentUser) return;
    
    // NAPRAWIONE: Pobieranie czystego ciągu znaków RRRR-MM-DD
    const today = new Date().toISOString().split("T")[0];

    if(currentUser.last_click === today){
        alert("Dzisiaj już zgłosiłeś dres!");
        return;
    }

    let streak = 1;

    if(currentUser.last_click){
        let last = new Date(currentUser.last_click);
        let now = new Date(today);
        let diff = (now - last) / (1000 * 60 * 60 * 24);

        if(diff === 1){
            streak = (currentUser.streak || 0) + 1;
        }
    }

    let best = Math.max(streak, currentUser.best_streak || 0);

    currentUser.streak = streak;
    currentUser.best_streak = best;
    currentUser.total_days = (currentUser.total_days || 0) + 1;
    currentUser.last_click = today;

    const { error } = await client
        .from("users")
        .update({
            streak: streak,
            best_streak: best,
            total_days: currentUser.total_days,
            last_click: today
        })
        .eq("id", currentUser.id);

    if(error) {
        alert("Nie udało się zaktualizować passy.");
    }

    updateUI();
}

/* ===== INFO ===== */
function jakNosic(){
    document.getElementById("output").innerHTML = "👕 Czarne dresy + sneakersy + hoodie = top styl";
}

/* ===== POLECANE ===== */
function polecane(){
    let html = "<h3>Polecane dresy</h3>";
    produkty.forEach(p => {
        html += `
            <div style="margin:10px 0;">
                <a href="${p.url}" target="_blank">👕 ${p.name}</a>
            </div>
        `;
    });
    document.getElementById("output").innerHTML = html;
}

/* ===== DISCORD ===== */
function discord(){
    window.open("https://discord.com", "_blank");
}

/* ===== TOP RANKING ===== */
async function showTop(){
    const { data, error } = await client
        .from("users")
        .select("*")
        .order("best_streak", { ascending: false })
        .limit(10);

    if(error){
        alert("Nie można pobrać rankingu.");
        return;
    }

    let html = "<h3>TOP PASSA NAJLEPSZYCH</h3>";
    data.forEach((u, i) => {
        html += `${i + 1}. ${u.username} — wynik: ${u.best_streak || 0}<br>`;
    });

    document.getElementById("topList").innerHTML = html;
    showScreen("top");
}
</script>

</body>
</html>
