<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People who LOVE WEAR tracksuit</title>

<style>
body {
    background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), url('tlo.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-color: #1a1a1a;
    color: white;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding: 30px;
    margin: 0;
}

/* Neonowy napis dla głównego nagłówka */
h1 {
    font-size: 2.5rem;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 5px #fff, 0 0 10px #2F2F4F, 0 0 20px #7ab7ff, 0 0 40px #7ab7ff;
    margin-bottom: 30px;
}

h2, h3 {
    text-shadow: 0 0 5px #fff, 0 0 10px #7ab7ff;
}

.screen {
    display: none;
    max-width: 400px;
    margin: 0 auto;
    background: rgba(47, 47, 79, 0.4);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.active { display: block; }

input, button {
    display: block;
    margin: 15px auto;
    padding: 15px;
    width: 300px; /* NAPRAWIONE: Szerokość przycisków przywrócona do normy */
    box-sizing: border-box;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
    transition: all 0.3s ease;
}

input {
    background: rgba(255, 255, 255, 0.1);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    text-align: center;
}

input:focus {
    outline: none;
    border-color: #7ab7ff;
    box-shadow: 0 0 10px rgba(122, 183, 255, 0.5);
}

button {
    background: linear-gradient(135deg, #2F2F4F, #1a1a3a);
    color: white;
    cursor: pointer;
    font-weight: bold;
    border: 1px solid rgba(122, 183, 255, 0.3);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

button:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #3a3a63, #22224d);
    box-shadow: 0 0 15px rgba(122, 183, 255, 0.6);
}

/* Wyrównanie statystyk profilu do lewej strony */
.profile-stats {
    text-align: left;
    background: rgba(0, 0, 0, 0.4);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
    border-left: 4px solid #7ab7ff;
    font-size: 1.05rem;
    line-height: 1.8;
}

#output {
    margin-top: 20px;
}

a {
    color: #7ab7ff;
    text-decoration: none;
    font-weight: bold;
}

a:hover {
    color: white;
    text-shadow: 0 0 8px #7ab7ff;
}
</style>
</head>
<body>

<h1>People who LOVE WEAR tracksuit</h1>

<div id="auth" class="screen active">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Zaloguj</button>
    <button onclick="register()">Stwórz konto</button>
</div>

<div id="menu" class="screen">
    <button onclick="showScreen('app')">Wchodzę na stronę</button>
    <button onclick="showTop()">Lista TOP</button>
</div>

<div id="top" class="screen">
    <h2>TOP Ranking</h2>
    <div id="topList"></div>
    <button onclick="showScreen('menu')">Powrót</button>
</div>

<div id="app" class="screen">
    <button onclick="losujDres()">1. Wylosuj dres</button>
    <button onclick="bylemWDresach()">2. Byłem dziś w dresach</button>
    <button onclick="jakNosic()">3. Jak nosić dresy</button>
    <button onclick="polecane()">4. Polecane dresy</button>
    <button onclick="discord()">5. Discord</button>
    <button onclick="showScreen('menu')">Menu</button>

    <div id="output"></div>
</div>

/* ===== SCREEN SYSTEM ===== */
function showScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("output").innerHTML = "";
    if(id === 'app') { updateUI(); }
}

/* ===== REGISTER ===== */
async function register(){
    const username=document.getElementById("username").value.trim();
    const password=document.getElementById("password").value.trim();

    if(!username || !password){
        alert("Wpisz login i hasło");
        return;
    }

    const {data, error}=await client.from("users").insert([{
        username,
        password,
        streak:0,
        best_streak:0,
        total_days:0,
        dres:""
    }]);

    if(error){
        alert("Błąd bazy: " + (error.message || JSON.stringify(error)));
        return;
    }

    alert("Konto stworzone! Możesz się teraz zalogować.");
}

function losujDres(){
    if(!currentUser) return;
    let i=0;

    const interval=setInterval(()=>{
        document.getElementById("output").innerHTML=
        "<div class='profile-stats' style='text-align:center;'>🎡 Losowanie... <br><b>" + dresy[i % dresy.length] + "</b></div>";

    },200);

    setTimeout(async ()=>{
        clearInterval(interval);

        const chosen=dresy[Math.floor(Math.random()*dresy.length)];

        await client
        .from("users")
        .update({dres:chosen})
        .eq("username",currentUser.username);

        updateUI();
    },3000);
}
