<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People who LOVE WEAR tracksuit</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), url('tlo.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-color: #111;
    color: white;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding: 30px;
    margin: 0;
}

h1 {
    font-size: 2.5rem;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 5px #fff, 0 0 10px #2F2F4F, 0 0 20px #7ab7ff, 0 0 40px #7ab7ff;
    margin-bottom: 30px;
}

.screen {
    display: none;
    max-width: 400px;
    margin: 0 auto;
    background: rgba(47, 47, 79, 0.4);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.37);
    border: 1px solid rgba(255,255,255,0.1);
}

.active { display: block; }

input, button {
    display: block;
    margin: 15px auto;
    padding: 15px;
    width: 100%;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
}

input {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    text-align: center;
}

button {
    background: linear-gradient(135deg, #2F2F4F, #1a1a3a);
    color: white;
    cursor: pointer;
    font-weight: bold;
    border: 1px solid rgba(122,183,255,0.3);
}

button:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #3a3a63, #22224d);
}

.profile-stats {
    text-align: left;
    background: rgba(0,0,0,0.4);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
    border-left: 4px solid #7ab7ff;
    font-size: 1.05rem;
    line-height: 1.8;
}

a {
    color: #7ab7ff;
    text-decoration: none;
    font-weight: bold;
}
a:hover {
    color: white;
}
</style>
</head>

<body>

<h1>People who LOVE WEAR tracksuit</h1>

<div id="auth" class="screen active">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Zaloguj</button>
    <button onclick="register()">Stwórz konto</button>
</div>

<div id="menu" class="screen">
    <button onclick="showScreen('app')">Wchodzę na stronę</button>
    <button onclick="showTop()">Lista TOP</button>
</div>

<div id="top" class="screen">
    <h2>TOP Ranking</h2>
    <div id="topList"></div>
    <button onclick="showScreen('menu')">Powrót</button>
</div>

<div id="app" class="screen">
    <button onclick="losujDres()">1. Wylosuj dres</button>
    <button onclick="bylemWDresach()">2. Byłem dziś w dresach</button>
    <button onclick="jakNosic()">3. Jak nosić dresy</button>
    <button onclick="polecane()">4. Polecane dresy</button>
    <button onclick="discord()">5. Discord</button>
    <button onclick="showScreen('menu')">Menu</button>

    <div id="output"></div>
</div>

<script>
/* ===== SUPABASE ===== */
const client = supabase.createClient(
    "https://aimyhgkpjtjjityrsmai.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpbXloZ2twanRqaml0eXJzbWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTg1MzYsImV4cCI6MjA5NzE5NDUzNn0.gM8nR0-zRJmOBX55E6beEb4T0PSW-tAcCB1icrol9VY"
);

let currentUser = null;

/* ===== LISTY ===== */
const dresy = [
    "Nike Tech Fleece",
    "Cusbclo Czarne",
    "Cusbclo Szare",
    "Cusbclo Granatowe",
    "Cusbclo Zielone",
    "Cusbclo Rich Red"
];

const produkty = [
  { name: "Nike Tech Fleece", url: "https://www.nike.com/pl/" },
  { name: "Cusbclo - Czarne", url: "https://www.cusbclo.com/collections/tracksuits-2025/products/jogger-schwarz" },
  { name: "Cusbclo - Szare grafitowe", url: "https://www.cusbclo.com/collections/tracksuits-2025/products/jogger-anthrazit" },
  { name: "Cusbclo - Granatowe", url: "https://www.cusbclo.com/collections/tracksuits-2025/products/navy-jogger" },
  { name: "Cusbclo - Zielone", url: "https://www.cusbclo.com/collections/tracksuits-2025/products/jogger-bronze-green" },
  { name: "Cusbclo - Rich red", url: "https://www.cusbclo.com/collections/tracksuits-2025/products/jogger-rich-red" }
];

/* ===== EKRANY ===== */
function showScreen(id){
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ===== REJESTRACJA ===== */
async function register(){
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    if(!username || !password){
        alert("Wpisz login i hasło");
        return;
    }

    await client.from("users").insert([{
        username,
        password,
        streak: 0,
        best_streak: 0,
        total_days: 0,
        dres: "",
        last_click: null
    }]);

    alert("Konto stworzone!");
}

/* ===== LOGOWANIE ===== */
async function login(){
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    const { data } = await client
        .from("users")
        .select("*")
        .eq("username", username)
        .eq("password", password)
        .maybeSingle();

    if(!data){
        alert("Zły login lub hasło");
        return;
    }

    currentUser = data;
    showScreen("menu");
}

/* ===== UI ===== */
function updateUI(){
    output.innerHTML = `
        <div class="profile-stats">
            👤 <b>Użytkownik:</b> ${currentUser.username}<br>
            🔥 <b>Passa:</b> ${currentUser.streak}<br>
            🏆 <b>Najlepsza passa:</b> ${currentUser.best_streak}<br>
            📅 <b>Dni w dresach:</b> ${currentUser.total_days}<br>
            👕 <b>Dres na dziś:</b> ${currentUser.dres || "brak"}
        </div>
    `;
}

/* ===== LOSOWANIE ===== */
function losujDres(){
    let i = 0;

    const interval = setInterval(() => {
        output.innerHTML = `<div class="profile-stats" style="text-align:center;">
            🎡 Losowanie... <br><b>${dresy[i % dresy.length]}</b>
        </div>`;
        i++;
    }, 150);

    setTimeout(async () => {
        clearInterval(interval);

        const chosen = dresy[Math.floor(Math.random() * dresy.length)];
        currentUser.dres = chosen;

        await client.from("users")
            .update({ dres: chosen })
            .eq("id", currentUser.id);

        updateUI();
    }, 2500);
}

/* ===== BYŁEM W DRESACH ===== */
async function bylemWDresach(){
    const today = new Date().toISOString().split("T")[0];

    if(currentUser.last_click === today){
        alert("Już dziś kliknąłeś!");
        return;
    }

    let streak = 1;

    if(currentUser.last_click){
        const diff = (new Date(today) - new Date(currentUser.last_click)) / (1000*60*60*24);
        if(diff === 1){
            streak = currentUser.streak + 1;
        }
    }

    const best = Math.max(streak, currentUser.best_streak);

    currentUser.streak = streak;
    currentUser.best_streak = best;
    currentUser.total_days++;
    currentUser.last_click = today;

    await client.from("users").update({
        streak,
        best_streak: best,
        total_days: currentUser.total_days,
        last_click: today
    }).eq("id", currentUser.id);

    updateUI();
}

/* ===== POLECANE ===== */
function polecane(){
    let html = `<div class="profile-stats" style="text-align:center;">
        <h3>Polecane dresy</h3>`;

    produkty.forEach(p => {
        html += `<div style="margin:10px 0;">
            <a href="${p.url}" target="_blank">👕 ${p.name}</a>
        </div>`;
    });

    html += "</div>";

    output.innerHTML = html;
}

/* ===== TOP LISTA ===== */
async function showTop(){
    const { data } = await client
        .from("users")
        .select("*")
        .order("best_streak", { ascending: false })
        .limit(10);

    let html = `<div class="profile-stats"><h3>TOP PASSA</h3>`;

    data.forEach((u, i) => {
        html += `${i+1}. <b>${u.username}</b> — ${u.best_streak}<br>`;
    });

    html += "</div>";

    topList.innerHTML = html;
    showScreen("top");
}

/* ===== DISCORD ===== */
function discord(){
    window.open("https://discord.com", "_blank");
}
</script>

</body>
</html>
